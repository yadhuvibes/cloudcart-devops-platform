{% extends "base.html" %}

{% block content %}

<h2>CloudCart Admin Dashboard</h2>

<form method="POST">

    <p>
        Product Name
    </p>

    <input type="text"
           name="name"
           required>

    <p>
        Price
    </p>

    <input type="number"
           step="0.01"
           name="price"
           required>

    <p>
        Category
    </p>

    <input type="text"
           name="category"
           required>

    <p>
        Image URL
    </p>

    <input type="text"
           name="image">

    <br><br>

    <button type="submit">

        Add Product

    </button>

</form>

<hr>

<h3>Current Products</h3>

{% for product in products %}

<div class="card">

    <h3>{{ product.name }}</h3>

    <p>₹ {{ product.price }}</p>

    <p>{{ product.category }}</p>

</div>

{% endfor %}

{% endblock %}
