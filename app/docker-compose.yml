services:

  cloudcart:
    image: cloudcart:v2
    container_name: cloudcart-app

    ports:
      - "5000:5000"

    volumes:
      - cloudcart-data:/app/database

    restart: unless-stopped

  nginx:
    image: nginx:latest

    container_name: cloudcart-nginx

    ports:
      - "80:80"

    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - cloudcart

    restart: unless-stopped

volumes:
  cloudcart-data:
